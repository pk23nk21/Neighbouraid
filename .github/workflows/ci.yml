name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt-in early to the Node 24 runtime for JavaScript-based actions. GitHub
# is deprecating Node 20 across the runner — without this flag every
# checkout / setup-node / setup-python / upload-artifact step prints a
# deprecation warning. The flag becomes a no-op once Node 24 is the default
# (June 2026), so it's safe to leave in place.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -----------------------------------------------------------------------
  # Backend: ruff lint + pytest with coverage on 3.11 and 3.12
  # Matrix gives us early warning when a new Python version breaks
  # something without needing a prod rollback.
  # -----------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # Use the keyword-heuristic fallback so CI doesn't need to download
      # the 1.6 GB HF model. The fallback path is exercised by unit tests.
      NA_DISABLE_AI_MODEL: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov

      - name: Ruff lint
        run: |
          cd backend
          # E9,F63,F7,F82 = syntax / undefined-name / import errors (show-stoppers).
          # Keeping the default ruleset to "don't block the build on style" —
          # the project isn't codebase-wide ruff-clean yet.
          ruff check app --select=E9,F63,F7,F82 --output-format=github

      - name: Run backend tests with coverage
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  # -----------------------------------------------------------------------
  # Frontend: ESLint, production build, artifact upload. Node 20 LTS is
  # the project baseline (Node 18 went EOL April 2025); the job is fast
  # enough that we don't need a matrix.
  # -----------------------------------------------------------------------
  frontend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Run frontend unit tests
        run: cd frontend && npm test

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # -----------------------------------------------------------------------
  # Non-blocking security audits. These warn but never fail the build —
  # transitive CVEs in a demo repo shouldn't block a merge. Real projects
  # should drop `continue-on-error` and fix the underlying deps.
  # -----------------------------------------------------------------------
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Python dependency audit
        # Don't fail the step on real CVEs — the job-level continue-on-error
        # only stops blocking dependents; the step itself would still go red
        # in the GitHub UI without `|| true`. We surface findings as a
        # printed report and let humans triage.
        run: |
          cd backend
          pip-audit -r requirements.txt --skip-editable || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (high + critical)
        run: |
          cd frontend
          npm audit --audit-level=high || true

  # -----------------------------------------------------------------------
  # Docker image build — just validates the Dockerfiles still build.
  # Gated on lint+tests so we don't waste 5 min on broken code.
  # -----------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test, frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (skip HF model download)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          build-args: SKIP_MODEL_DOWNLOAD=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
