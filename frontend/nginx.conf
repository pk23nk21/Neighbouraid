server {
    listen 3000;
    server_tokens off;

    # ─── Security headers ──────────────────────────────────────────────
    # Tightened for the SPA. Backend headers are set by FastAPI's
    # SecurityHeadersMiddleware and pass through unchanged below.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    # CSP for the SPA. Vite's hashed bundles + inline-style + leaflet
    # tile fetches + osm/qrserver/translate.googleapis fetches are all
    # what the app actually needs at runtime. 'unsafe-inline' on style
    # is required by Tailwind's emit pattern; we don't allow inline JS.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https://*.tile.openstreetmap.org https://unpkg.com https://api.qrserver.com;
        font-src 'self' data:;
        connect-src 'self' https: wss:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ─── Static SPA shell ──────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite bundles never change for a given URL — cache aggressively
    location /assets/ {
        root   /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker MUST NOT be cached aggressively or users get stuck
    # on an old build forever
    location = /service-worker.js {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ─── Backend proxies ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Bump from nginx's 60-second default — WS is long-lived
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
