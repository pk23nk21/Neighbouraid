services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        # Set SKIP_MODEL_DOWNLOAD=1 in .env to skip the 1.6 GB HF model
        # download at image build time (good for small VMs / CI).
        SKIP_MODEL_DOWNLOAD: ${SKIP_MODEL_DOWNLOAD:-0}
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/neighbouraid
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — see .env.example}
      - NA_DISABLE_AI_MODEL=${NA_DISABLE_AI_MODEL:-0}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
